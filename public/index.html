<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG Chatbot</h1>
      <p class="subtitle">Ask questions about the uploaded documents</p>
      <div class="upload-area">
        <label class="upload-btn" for="file-input">Upload Document (.txt, .pdf)</label>
        <input type="file" id="file-input" accept=".txt,.pdf" hidden>
        <span class="upload-status" id="upload-status"></span>
      </div>
    </header>

    <div class="chat" id="chat">
      <div class="message assistant">
        <div class="message-content">
          Hello! I can answer questions based on the loaded documents. Try asking about the menu, prices, opening hours, or delivery options.
        </div>
      </div>
    </div>

    <form class="input-area" id="form">
      <input
        type="text"
        id="input"
        placeholder="Ask a question..."
        autocomplete="off"
      >
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
